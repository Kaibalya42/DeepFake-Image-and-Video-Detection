name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ml:
    name: ML (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen || uv sync

      - name: Run tests
        run: uv run pytest

      - name: Lint
        run: uv run ruff check .
